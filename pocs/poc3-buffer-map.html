<!DOCTYPE html>
<html>
<head><title>PoC3: Buffer Operations + PBO - ANGLE Metal</title></head>
<body>
<canvas id="c" width="256" height="256"></canvas>
<pre id="log"></pre>
<script>
function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
  console.log('[POC3] ' + msg);
}

function getError(gl) {
  const errs = [];
  let e;
  while ((e = gl.getError()) !== gl.NO_ERROR) errs.push('0x' + e.toString(16));
  return errs.length ? errs.join(',') : 'none';
}

async function run() {
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl2');
  if (!gl) { log('FAIL: No WebGL2'); return; }

  log('Renderer: ' + gl.getParameter(gl.RENDERER));

  // Test 1: Large buffer allocations
  log('\n--- Test 1: Large buffer allocations ---');
  const sizes = [
    [256 * 1024 * 1024, '256MB'],
    [512 * 1024 * 1024, '512MB'],
    [1024 * 1024 * 1024, '1GB'],
    [0x7FFFFFFF, '2GB-1'],
  ];

  for (const [size, desc] of sizes) {
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    try {
      gl.bufferData(gl.ARRAY_BUFFER, size, gl.DYNAMIC_DRAW);
      const err = getError(gl);
      log('Buffer ' + desc + ': error=' + err);
    } catch(e) {
      log('Buffer ' + desc + ': EXCEPTION: ' + e.message);
    }
    gl.deleteBuffer(buf);
  }

  // Test 2: getBufferSubData with edge-case offsets
  log('\n--- Test 2: getBufferSubData offset/length edge cases ---');
  const buf2 = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf2);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(1024), gl.STATIC_DRAW);
  log('Base buffer 4096 bytes: error=' + getError(gl));

  const dest = new Float32Array(1024);
  const subTests = [
    [0, 'full range, offset=0'],
    [4092, 'near end, offset=4092'],
    [4096, 'at end, offset=4096 (should fail)'],
    [4097, 'past end, offset=4097'],
    [0x7FFFFFFF, 'huge offset'],
  ];

  for (const [srcOffset, desc] of subTests) {
    try {
      gl.getBufferSubData(gl.ARRAY_BUFFER, srcOffset, dest);
      log(desc + ': error=' + getError(gl));
    } catch(e) {
      log(desc + ': EXCEPTION: ' + e.message.substring(0, 80));
    }
  }
  gl.deleteBuffer(buf2);

  // Test 3: bufferSubData with overflow offset+size
  log('\n--- Test 3: bufferSubData offset overflow ---');
  const buf3 = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf3);
  gl.bufferData(gl.ARRAY_BUFFER, 4096, gl.DYNAMIC_DRAW);

  const subDataTests = [
    [0, 4096, 'full write'],
    [4092, 8, '4 bytes past end'],
    [4096, 4, 'at end'],
    [0x7FFFFFF0, 16, 'huge offset'],
    [0, 4097, '1 byte too much data'],
  ];

  for (const [offset, dataSize, desc] of subDataTests) {
    try {
      gl.bufferSubData(gl.ARRAY_BUFFER, offset, new Uint8Array(dataSize));
      log(desc + ': error=' + getError(gl));
    } catch(e) {
      log(desc + ': EXCEPTION: ' + e.message.substring(0, 80));
    }
  }
  gl.deleteBuffer(buf3);

  // Test 4: PBO readPixels with size mismatches
  log('\n--- Test 4: PBO readPixels edge cases ---');
  
  // Create a renderable texture
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, 256, 256, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);

  // Undersized PBO for readPixels
  const pboSizes = [
    [1, 'PBO 1 byte (way too small)'],
    [256, 'PBO 256 bytes (too small)'],
    [256 * 256 * 4, 'PBO exact size'],
    [256 * 256 * 4 - 1, 'PBO 1 byte short'],
  ];

  for (const [pboSize, desc] of pboSizes) {
    const pbo = gl.createBuffer();
    gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pbo);
    gl.bufferData(gl.PIXEL_PACK_BUFFER, pboSize, gl.STREAM_READ);
    
    try {
      gl.readPixels(0, 0, 256, 256, gl.RGBA, gl.UNSIGNED_BYTE, 0);
      log(desc + ': error=' + getError(gl));
    } catch(e) {
      log(desc + ': EXCEPTION: ' + e.message.substring(0, 80));
    }
    
    gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
    gl.deleteBuffer(pbo);
  }

  // Test 5: PBO readPixels with offset into PBO
  log('\n--- Test 5: PBO readPixels with offsets ---');
  const pbo5 = gl.createBuffer();
  gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pbo5);
  gl.bufferData(gl.PIXEL_PACK_BUFFER, 256 * 256 * 4, gl.STREAM_READ);

  const pboOffsets = [
    [0, 'offset=0'],
    [4, 'offset=4'],
    [256 * 256 * 4 - 4, 'offset near end (overflow read)'],
    [256 * 256 * 4, 'offset=bufferSize'],
    [0x7FFFFFFF, 'huge offset'],
  ];

  for (const [offset, desc] of pboOffsets) {
    try {
      gl.readPixels(0, 0, 256, 256, gl.RGBA, gl.UNSIGNED_BYTE, offset);
      log(desc + ': error=' + getError(gl));
    } catch(e) {
      log(desc + ': EXCEPTION: ' + e.message.substring(0, 80));
    }
  }
  
  gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
  gl.deleteBuffer(pbo5);

  // Test 6: PBO texImage2D with offset overflow
  log('\n--- Test 6: PBO texImage2D upload with offsets ---');
  const pbo6 = gl.createBuffer();
  gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, pbo6);
  gl.bufferData(gl.PIXEL_UNPACK_BUFFER, 256 * 256 * 4, gl.STATIC_DRAW);

  const tex6 = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex6);

  const uploadOffsets = [
    [0, 256, 256, 'full upload offset=0'],
    [4, 256, 256, 'offset=4 (will overflow)'],
    [256 * 256 * 4 - 4, 1, 1, 'near-end offset, 1x1'],
    [256 * 256 * 4, 1, 1, 'at-end offset, 1x1'],
    [0x7FFFFFFF, 1, 1, 'huge offset, 1x1'],
  ];

  for (const [offset, w, h, desc] of uploadOffsets) {
    try {
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, offset);
      log(desc + ': error=' + getError(gl));
    } catch(e) {
      log(desc + ': EXCEPTION: ' + e.message.substring(0, 80));
    }
  }

  gl.bindBuffer(gl.PIXEL_UNPACK_BUFFER, null);
  gl.deleteBuffer(pbo6);
  gl.deleteTexture(tex6);

  // Test 7: copyBufferSubData edge cases
  log('\n--- Test 7: copyBufferSubData overflow ---');
  const src = gl.createBuffer();
  const dst = gl.createBuffer();
  gl.bindBuffer(gl.COPY_READ_BUFFER, src);
  gl.bindBuffer(gl.COPY_WRITE_BUFFER, dst);
  gl.bufferData(gl.COPY_READ_BUFFER, 4096, gl.STATIC_DRAW);
  gl.bufferData(gl.COPY_WRITE_BUFFER, 4096, gl.STATIC_DRAW);

  const copyTests = [
    [0, 0, 4096, 'full copy'],
    [0, 0, 4097, 'copy 1 byte too much'],
    [4095, 0, 2, 'src overflow by 1'],
    [0, 4095, 2, 'dst overflow by 1'],
    [0x7FFFFFF0, 0, 16, 'huge src offset'],
    [0, 0x7FFFFFF0, 16, 'huge dst offset'],
    [0x7FFFFFF0, 0, 0x7FFFFFF0, 'huge src offset + huge size'],
  ];

  for (const [roff, woff, size, desc] of copyTests) {
    try {
      gl.copyBufferSubData(gl.COPY_READ_BUFFER, gl.COPY_WRITE_BUFFER, roff, woff, size);
      log(desc + ': error=' + getError(gl));
    } catch(e) {
      log(desc + ': EXCEPTION: ' + e.message.substring(0, 80));
    }
  }
  gl.deleteBuffer(src);
  gl.deleteBuffer(dst);

  // Test 8: Transform feedback with mismatched buffer sizes
  log('\n--- Test 8: Transform feedback buffer binding edge cases ---');
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, `#version 300 es
    in float aVal;
    out float vOut;
    void main() { vOut = aVal * 2.0; gl_Position = vec4(0); }`);
  gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, `#version 300 es
    precision mediump float;
    out vec4 c;
    void main() { c = vec4(1); }`);
  gl.compileShader(fs);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.transformFeedbackVaryings(prog, ['vOut'], gl.SEPARATE_ATTRIBS);
  gl.linkProgram(prog);
  
  if (gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    gl.useProgram(prog);
    
    const inBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, inBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([1, 2, 3, 4]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'aVal');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 1, gl.FLOAT, false, 0, 0);

    // Tiny output buffer (too small for 4 vertices)
    const outBuf = gl.createBuffer();
    gl.bindBuffer(gl.TRANSFORM_FEEDBACK_BUFFER, outBuf);
    gl.bufferData(gl.TRANSFORM_FEEDBACK_BUFFER, 4, gl.DYNAMIC_READ); // Only 1 float
    
    const tf = gl.createTransformFeedback();
    gl.bindTransformFeedback(gl.TRANSFORM_FEEDBACK, tf);
    gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 0, outBuf);
    
    gl.enable(gl.RASTERIZER_DISCARD);
    gl.beginTransformFeedback(gl.POINTS);
    
    try {
      // Draw 4 vertices into buffer that fits only 1
      gl.drawArrays(gl.POINTS, 0, 4);
      log('TF overflow draw: error=' + getError(gl));
    } catch(e) {
      log('TF overflow: EXCEPTION: ' + e.message);
    }
    
    gl.endTransformFeedback();
    gl.disable(gl.RASTERIZER_DISCARD);
    
    // Read back
    gl.bindBuffer(gl.TRANSFORM_FEEDBACK_BUFFER, outBuf);
    const readback = new Float32Array(4);
    try {
      gl.getBufferSubData(gl.TRANSFORM_FEEDBACK_BUFFER, 0, readback);
      log('TF readback: ' + Array.from(readback).join(', ') + ' error=' + getError(gl));
    } catch(e) {
      log('TF readback: EXCEPTION: ' + e.message.substring(0, 80));
    }
    
    gl.deleteTransformFeedback(tf);
    gl.deleteBuffer(inBuf);
    gl.deleteBuffer(outBuf);
  } else {
    log('TF shader link failed: ' + gl.getProgramInfoLog(prog));
  }

  gl.deleteFramebuffer(fbo);
  gl.deleteTexture(tex);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);

  log('\n=== PoC3 Complete ===');
}

run().catch(e => log('FATAL: ' + e.message + '\n' + e.stack));
</script>
</body>
</html>
