name: WebNN ScatterND Test on macOS

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome Canary
        run: |
          brew install --cask google-chrome-canary || brew install --cask google-chrome

      - name: Find Chrome
        id: chrome
        run: |
          CHROME="/Applications/Google Chrome Canary.app/Contents/MacOS/Google Chrome Canary"
          if [ ! -f "$CHROME" ]; then
            CHROME="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          fi
          echo "path=$CHROME" >> $GITHUB_OUTPUT
          "$CHROME" --version

      - name: Serve PoC and run Chrome
        run: |
          # Start HTTP server
          python3 -m http.server 8877 &
          sleep 2

          # Run Chrome with WebNN enabled
          "${{ steps.chrome.outputs.path }}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu-sandbox \
            --enable-features=WebMachineLearningNeuralNetwork \
            --enable-logging=stderr \
            --v=1 \
            --dump-dom \
            http://localhost:8877/webnn_scatter_oob.html \
            2>&1 | tee chrome_output.log || true

          # Wait for execution
          sleep 15

          # Also try with --enable-unsafe-webgpu for broader feature support
          "${{ steps.chrome.outputs.path }}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu-sandbox \
            --enable-features=WebMachineLearningNeuralNetwork \
            --enable-logging=stderr \
            --v=1 \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=30000 \
            http://localhost:8877/webnn_scatter_oob.html \
            2>&1 | tee -a chrome_output.log || true

      - name: Check for crashes
        run: |
          echo "=== Chrome Output (last 50 lines) ==="
          tail -50 chrome_output.log
          echo ""
          echo "=== Checking for crashes ==="
          grep -i "crash\|abort\|signal\|segfault\|asan\|ERROR\|OOB\|scatter" chrome_output.log || echo "No crash keywords found"
          echo ""
          echo "=== Checking for WebNN logs ==="
          grep -i "webnn\|WebNN\|scatter\|gather\|coreml\|CoreML\|MLContext" chrome_output.log || echo "No WebNN logs found"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-output
          path: chrome_output.log
